services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${WORDPRESS_DB_NAME:-church}
      MYSQL_USER: ${WORDPRESS_DB_USER:-church}
      MYSQL_PASSWORD: ${WORDPRESS_DB_PASSWORD:-church}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    image: wordpress:6.5.5-php8.2-apache
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "${WORDPRESS_PORT:-8080}:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME:-church}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER:-church}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD:-church}
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG', true);
        define('WP_DEBUG_LOG', true);
        define('SCRIPT_DEBUG', true);
        define('DISALLOW_FILE_EDIT', true);
        define('FS_METHOD', 'direct');
    volumes:
      - wordpress_data:/var/www/html
      - ./wp-content:/var/www/html/wp-content

  wpcli:
    image: wordpress:cli-php8.2
    depends_on:
      - db
      - wordpress
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME:-church}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER:-church}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD:-church}
      WP_CLI_ALLOW_ROOT: "1"
    volumes:
      - wordpress_data:/var/www/html
      - ./wp-content:/var/www/html/wp-content
    entrypoint:
      - wp
      - --allow-root
      - --path=/var/www/html

volumes:
  db_data:
  wordpress_data:
